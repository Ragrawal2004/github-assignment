# Hyperparameter search spaces, one block per model.
# Keys MUST match the keys returned by ModelFactory.get_models().
# A model with no entry here is trained with its library defaults
# (ModelTuner falls back to a plain .fit() in that case).

logistic_regression:
  C: [0.01, 0.1, 1, 10]
  solver: ["lbfgs"]
  max_iter: [1000]

decision_tree:
  max_depth: [3, 5, 10, null]
  min_samples_split: [2, 5, 10]
  criterion: ["gini", "entropy"]

random_forest:
  n_estimators: [100, 200]
  max_depth: [5, 10, null]
  min_samples_split: [2, 5]

xgboost:
  n_estimators: [100, 200]
  max_depth: [3, 5, 7]
  learning_rate: [0.05, 0.1]
