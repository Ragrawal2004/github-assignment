[pytest]
# Where tests live -- keeps pytest from accidentally collecting
# notebooks/, scripts/, or anything else that happens to match test_*.py.
testpaths = tests

# Explicit instead of relying on pytest's implicit rootdir-insertion
# behavior (which only works because tests/ has an __init__.py). Being
# explicit here means `from src.xxx import yyy` keeps working even if
# that changes, and CI runners don't depend on cwd quirks.
pythonpath = .

addopts =
    -v
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=xml

# `--strict-markers` above means an unregistered marker is a hard
# error, not a silent no-op -- so these have to be declared here.
# Nothing in tests/ is marked yet (the whole suite currently runs as
# one block, see the CI notes for why); registering these now means
# `@pytest.mark.slow` etc. can be adopted incrementally later without
# touching this file again.
markers =
    slow: exercises real hyperparameter search / trains real models -- not mocked, seconds-to-minutes per test
    integration: exercises multiple components together (e.g. full TrainingPipeline)
